<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karakeep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="app">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">
          <span class="logo-icon">◆</span>
          Karakeep
        </h1>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-filter="all">
          <span class="nav-icon">◻</span>
          <span>All Bookmarks</span>
          <span class="nav-count" id="count-all">0</span>
        </button>
        <button class="nav-item" data-filter="link">
          <span class="nav-icon">🔗</span>
          <span>Links</span>
          <span class="nav-count" id="count-link">0</span>
        </button>
        <button class="nav-item" data-filter="note">
          <span class="nav-icon">📝</span>
          <span>Notes</span>
          <span class="nav-count" id="count-note">0</span>
        </button>
        <button class="nav-item" data-filter="image">
          <span class="nav-icon">🖼</span>
          <span>Images</span>
          <span class="nav-count" id="count-image">0</span>
        </button>
      </nav>

      <div class="sidebar-section">
        <h3 class="sidebar-section-title">Tags</h3>
        <div id="tag-list" class="tag-list"></div>
      </div>

      <div class="sidebar-footer">
        <button class="nav-item" id="btn-settings">
          <span class="nav-icon">⚙</span>
          <span>Settings</span>
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="content" class="content">
      <header class="content-header">
        <div class="search-wrapper">
          <span class="search-icon">⌕</span>
          <input type="text" id="search-input" class="search-input" placeholder="Search bookmarks... ( / )" autocomplete="off" />
          <kbd class="search-kbd">/</kbd>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary" id="btn-add-bookmark">
            <span>+</span> New
          </button>
        </div>
      </header>

      <div class="content-body">
        <div id="bookmarks-grid" class="bookmarks-grid"></div>
        <div id="empty-state" class="empty-state hidden">
          <div class="empty-icon">◇</div>
          <h3>No bookmarks yet</h3>
          <p>Add your first bookmark to get started</p>
        </div>
        <div id="no-results" class="empty-state hidden">
          <div class="empty-icon">⌕</div>
          <h3>No results</h3>
          <p>Try adjusting your search or filters</p>
        </div>
      </div>
    </main>

    <!-- DETAIL PANEL -->
    <aside id="detail-panel" class="detail-panel hidden">
      <div class="detail-header">
        <h3>Details</h3>
        <button class="btn-icon" id="btn-close-detail">✕</button>
      </div>
      <div class="detail-body">
        <div id="detail-image" class="detail-image hidden">
          <img id="detail-img" src="" alt="" loading="lazy" />
        </div>
        <h2 id="detail-title" class="detail-title"></h2>
        <p id="detail-url" class="detail-url"></p>
        <div id="detail-summary" class="detail-summary hidden">
          <h4>AI Summary</h4>
          <p id="detail-summary-text"></p>
        </div>
        <div class="detail-meta">
          <div class="meta-row">
            <span class="meta-label">Type</span>
            <span id="detail-type" class="meta-value badge"></span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Created</span>
            <span id="detail-date" class="meta-value"></span>
          </div>
          <div class="meta-row" id="detail-ai-status-row">
            <span class="meta-label">AI</span>
            <span id="detail-ai-status" class="meta-value"></span>
          </div>
        </div>
        <div id="detail-tags" class="detail-tags"></div>
        <div id="detail-content" class="detail-content hidden">
          <h4>Content</h4>
          <div id="detail-content-text"></div>
        </div>
        <div class="detail-actions">
          <button class="btn btn-secondary" id="btn-edit-bookmark">Edit</button>
          <button class="btn btn-danger" id="btn-delete-bookmark">Delete</button>
          <a class="btn btn-secondary" id="btn-open-url" href="#" target="_blank" rel="noopener">Open ↗</a>
        </div>
      </div>
    </aside>
  </div>

  <!-- ADD/EDIT MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="bookmark-modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Bookmark</h3>
        <button class="btn-icon modal-close" id="btn-close-modal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Type</label>
          <div class="type-selector">
            <button class="type-btn active" data-type="link">🔗 Link</button>
            <button class="type-btn" data-type="note">📝 Note</button>
            <button class="type-btn" data-type="image">🖼 Image</button>
          </div>
        </div>
        <div class="form-group" id="fg-url">
          <label for="input-url">URL</label>
          <input type="url" id="input-url" class="input" placeholder="https://example.com" />
          <span class="input-hint" id="url-hint"></span>
        </div>
        <div class="form-group">
          <label for="input-title">Title</label>
          <input type="text" id="input-title" class="input" placeholder="Bookmark title" />
        </div>
        <div class="form-group" id="fg-description">
          <label for="input-description">Description</label>
          <textarea id="input-description" class="input textarea" placeholder="Optional description" rows="3"></textarea>
        </div>
        <div class="form-group" id="fg-content">
          <label for="input-content">Content</label>
          <textarea id="input-content" class="input textarea" placeholder="Note content or image URL" rows="5"></textarea>
        </div>
        <div class="form-group">
          <label for="input-tags">Tags</label>
          <input type="text" id="input-tags" class="input" placeholder="Comma-separated tags" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancel-modal">Cancel</button>
        <button class="btn btn-primary" id="btn-save-bookmark">Save</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div id="settings-overlay" class="modal-overlay hidden">
    <div class="modal" id="settings-modal">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="btn-icon modal-close" id="btn-close-settings">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="input-api-key">Anthropic API Key</label>
          <input type="password" id="input-api-key" class="input" placeholder="sk-ant-..." />
          <span class="input-hint">Required for AI tagging and summaries</span>
        </div>
        <div class="form-group">
          <button class="btn btn-secondary" id="btn-test-api">Test Connection</button>
          <span id="api-test-result" class="api-test-result"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancel-settings">Cancel</button>
        <button class="btn btn-primary" id="btn-save-settings">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
